[General]
network = SistemaPriorita
sim-time-limit = 200000s   # Durata totale per assicurare la stabilità
repeat = 20                # 20 esperimenti (run) per ogni configurazione [cite: 1202]

# --- Parametri del Modello [cite: 1194, 1195] ---
# OMNeT++ eseguirà automaticamente tutte le 8 combinazioni
**.p = ${p_val=0.75, 0.85}
**.q = ${q_val=0.2, 0.3}
**.sigma = ${sigma_val=0.6, 0.7}

# --- Analisi del Transiente  ---
# Ignora i primi 10.000 secondi per le medie (warm-up)
#warmup-period = 10000s

[Config TransienteWelch]
network = SistemaPriorita
sim-time-limit = 20000s
repeat = 20

**.p = 0.75
**.q = 0.2
**.sigma = 0.6

# Diciamo a OMNeT++ di salvare la storia temporale (vettore) della Coda 2
**.q2LenSignal:vector.record = true